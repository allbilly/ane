name: Whisper ANE Model Generation

on:
  push:
    branches: [macos-buildhwx]
  workflow_dispatch:

jobs:
  generate-and-convert:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          path: allbilly_ane

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install numpy coremltools

      - name: Download Whisper tiny CoreML model
        run: |
          cd allbilly_ane
          wget -O ggml-tiny-encoder.mlmodelc.zip https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny-encoder.mlmodelc.zip
          unzip -o ggml-tiny-encoder.mlmodelc.zip

      - name: Run mlmodelc2hwx
        run: |
          cd allbilly_ane
          git clone https://github.com/freedomtan/coreml_to_ane_hwx
          cd coreml_to_ane_hwx
          make
          chmod +x ./mlmodelc2hwx
          ./mlmodelc2hwx ../ggml-tiny-encoder.mlmodelc

      - name: Upload HWX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-tiny-encoder-hwx
          path: /tmp/hwx_output/*/model.hwx